<!DOCTYPE html>
<html>
<head>
<title>AI Code Detector</title>
<style>
body{font-family:sans-serif;background:#020617;color:white;display:flex;justify-content:center;padding:40px}
.card{background:#0f172a;padding:25px;border-radius:12px;width:480px}
textarea{width:100%;height:120px;margin:10px 0;background:#020617;color:white;border:1px solid #1e293b}
button{padding:10px;background:#22c55e;border:none;color:white;border-radius:6px}
.result{font-size:20px;margin-top:10px}
canvas{margin-top:15px;background:#020617}
</style>
</head>

<body>
<div class="card">
<h2>AI Code Detector</h2>

<textarea id="code"></textarea>
<button onclick="run()">Analyze</button>

<div class="result" id="result"></div>
<canvas id="chart" width="350" height="200"></canvas>
</div>

<script>
function analyzeCode(c){

  let lines = c.split("\n");

  let indentVar = variance(lines.map(l=>l.search(/\S|$/)));

  let comments = (c.match(/\/\//g)||[]).length;

  let cleanNaming = /[a-zA-Z]+[A-Z][a-zA-Z]+/.test(c) ? 1 : 0;

  let repetition = (c.match(/for|while/g)||[]).length / lines.length;

  return {
    structure: 1 - indentVar/10,
    comments: comments/lines.length,
    naming: cleanNaming,
    repetition
  };
}

function runFuzzy(f){

  let ai =
    f.structure*0.3 +
    f.naming*0.3 +
    f.comments*0.2 +
    f.repetition*0.2;

  let human =
    (1-f.structure)*0.4 +
    (1-f.naming)*0.3 +
    (1-f.comments)*0.3;

  let score = ai/(ai+human||1);

  return {score, ai, human};
}

function run(){
  let c = document.getElementById("code").value;
  let f = analyzeCode(c);
  let r = runFuzzy(f);

  document.getElementById("result").innerText =
    "AI Probability: " + Math.round(r.score*100)+"%";

  draw(r);
}

function draw(r){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,350,200);

  let ai=r.ai, human=r.human;
  let total=ai+human||1;

  let angle=(ai/total)*2*Math.PI;

  ctx.beginPath();
  ctx.fillStyle="red";
  ctx.moveTo(175,100);
  ctx.arc(175,100,70,0,angle);
  ctx.fill();

  ctx.beginPath();
  ctx.fillStyle="green";
  ctx.moveTo(175,100);
  ctx.arc(175,100,70,angle,2*Math.PI);
  ctx.fill();
}

function variance(a){
  let m=a.reduce((s,v)=>s+v,0)/a.length;
  return a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length;
}
</script>
</body>
</html>
